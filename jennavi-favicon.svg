<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Jennavi">
  <defs>
    <linearGradient id="fGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8CC70"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#B8962A"/>
    </linearGradient>
    <radialGradient id="fGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Ink black circle background -->
  <rect width="100" height="100" rx="16" fill="#0a0a0a"/>
  
  <!-- Subtle glow -->
  <circle cx="50" cy="50" r="44" fill="url(#fGlow)"/>
  
  <!-- The J letterform - distinctive and legible at 16x16 -->
  <text 
    x="50" 
    y="76" 
    font-family="'Garamond', 'Cormorant Garamond', 'EB Garamond', Georgia, serif"
    font-weight="700"
    font-size="74"
    text-anchor="middle"
    fill="url(#fGold)">J</text>
  
  <!-- Thin horizontal accent line at the base -->
  <line x1="18" y1="84" x2="82" y2="84" stroke="#C9A84C" stroke-width="1.5" stroke-opacity="0.5"/>
  
  <!-- Small diamond accent top-right - the Jennavi signature mark -->
  <rect x="67" y="12" width="7" height="7" transform="rotate(45 70.5 15.5)" fill="#C9A84C"/>
  
  <!-- Diagonal slash accent - forward motion, authority -->
  <line x1="14" y1="78" x2="28" y2="16" stroke="#C9A84C" stroke-width="1.2" stroke-opacity="0.25"/>
</svg>
